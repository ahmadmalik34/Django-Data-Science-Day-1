{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A Day 1 Django personal bio site built with a warm light orange and black theme.">
    <title>{% block title %}Muhammad Ahmad | Day 1 Django Portfolio{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="site-shell">
        <header class="site-header">
            <a class="brand" href="{% url 'home' %}">
                <span class="brand-mark">MA</span>
                <span>
                    <strong>Muhammad Ahmad</strong>
                    <small>Day 1 Django Portfolio</small>
                </span>
            </a>

            <nav class="site-nav" aria-label="Primary navigation">
                <a href="{% url 'home' %}">Home</a>
                <a href="{% url 'about' %}">About</a>
                <a href="{% url 'contact' %}">Contact</a>
            </nav>
        </header>

        <main class="site-main">
            {% block content %}{% endblock %}
        </main>

        <footer class="site-footer">
            <p>Built during Day 1 of the 50-day Django + Data Science challenge.</p>
        </footer>
    </div>
</body>
</html>
